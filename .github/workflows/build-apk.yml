name: Build & Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        continue-on-error: true

      - name: Upload Unsigned APK (if signing skipped)
        if: steps.sign_app.outcome == 'failure' || steps.sign_app.outcome == 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: husn-ada-unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Signed APK
        if: steps.sign_app.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: husn-ada-signed
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: v${{ github.run_number }}
          name: "حسن ادا کورس v${{ github.run_number }}"
          body: |
            ## 📱 حسن ادا کورس — نئی اپڈیٹ

            ### Download APK below ↓
            Install on Android: tap the APK file → Allow unknown sources → Install

            **Changes:** Auto-build from commit ${{ github.sha }}
          files: |
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
